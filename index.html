    <!-- ================================================
         TEMA 1: DARK / TECH  (activo cuando data-theme="dark")
         TEMA 2: LIGHT / LIQUID GLASS (activo cuando data-theme="light")
    ================================================ -->
    <style>
    /* ============================================================
       SWITCH DE TEMA — variables y lógica de selección
    ============================================================ */

    /* — Tema oscuro (por defecto) — */
    :root,
    [data-theme="dark"] {
        --bg-void:       #050810;
        --bg-deep:       #080d1a;
        --bg-card:       #0d1322;
        --bg-elevated:   #111828;
        --border-dim:    rgba(0, 229, 255, 0.12);
        --border-glow:   rgba(0, 229, 255, 0.45);
        --cyan:          #00e5ff;
        --cyan-dim:      rgba(0, 229, 255, 0.6);
        --orange:        #ff6b00;
        --orange-dim:    rgba(255, 107, 0, 0.5);
        --gold:          #ffb300;
        --green-circuit: #00ff88;
        --text-bright:   #f0f6ff;
        --text-mid:      rgba(200, 220, 240, 0.75);
        --text-dim:      rgba(160, 190, 210, 0.5);
        --glow-cyan:     0 0 40px rgba(0, 229, 255, 0.25);
        --glow-orange:   0 0 40px rgba(255, 107, 0, 0.25);
        --radius-sharp:  2px;
        --radius-card:   6px;
        --clip-corner:   polygon(0 0, calc(100% - 24px) 0, 100% 24px, 100% 100%, 24px 100%, 0 calc(100% - 24px));
        --clip-btn:      polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
        --clip-tag:      polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
        --transition:    0.35s cubic-bezier(0.4, 0, 0.2, 1);

        /* switch pill */
        --switch-bg:       rgba(0, 229, 255, 0.12);
        --switch-border:   rgba(0, 229, 255, 0.4);
        --switch-knob:     var(--cyan);
        --switch-icon-off: '☀';
        --switch-icon-on:  '☾';
    }

    /* — Tema claro — */
    [data-theme="light"] {
        --bg-void:       #f0f2f7;
        --bg-deep:       #e8ebf4;
        --bg-card:       rgba(255,255,255,0.65);
        --bg-elevated:   rgba(255,255,255,0.85);
        --border-dim:    rgba(61, 79, 255, 0.12);
        --border-glow:   rgba(61, 79, 255, 0.35);
        --cyan:          #3d4fff;
        --cyan-dim:      rgba(61, 79, 255, 0.6);
        --orange:        #8f5fff;
        --orange-dim:    rgba(143, 95, 255, 0.5);
        --gold:          #ff4f7a;
        --green-circuit: #3d4fff;
        --text-bright:   #0d1026;
        --text-mid:      #3a3f5c;
        --text-dim:      #6b7080;
        --glow-cyan:     0 0 40px rgba(61, 79, 255, 0.2);
        --glow-orange:   0 0 40px rgba(143, 95, 255, 0.2);
        --radius-sharp:  8px;
        --radius-card:   16px;
        --clip-corner:   none;
        --clip-btn:      none;
        --clip-tag:      none;
        --transition:    0.35s cubic-bezier(0.4, 0, 0.2, 1);

        --switch-bg:     rgba(61, 79, 255, 0.08);
        --switch-border: rgba(61, 79, 255, 0.3);
        --switch-knob:   #3d4fff;
    }

    /* ============================================================
       RESET
    ============================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow-x: hidden; scroll-behavior: smooth; }
    body {
        font-family: 'Rajdhani', sans-serif;
        background: var(--bg-void);
        color: var(--text-bright);
        overflow-x: hidden;
        line-height: 1.65;
        max-width: 100vw;
        -webkit-font-smoothing: antialiased;
        transition: background 0.4s ease, color 0.4s ease;
    }

    /* ============================================================
       FONDO ANIMADO
    ============================================================ */
    .circuit-bg {
        position: fixed; inset: 0; z-index: -2;
        transition: background 0.6s ease;
    }
    [data-theme="dark"] .circuit-bg {
        background:
            radial-gradient(ellipse 60% 50% at 15% 25%, rgba(0,229,255,0.07) 0%, transparent 70%),
            radial-gradient(ellipse 50% 60% at 85% 75%, rgba(255,107,0,0.06) 0%, transparent 70%),
            radial-gradient(ellipse 40% 40% at 50% 50%, rgba(0,255,136,0.03) 0%, transparent 70%),
            #050810;
    }
    [data-theme="light"] .circuit-bg {
        background:
            radial-gradient(ellipse 70% 60% at 10% 20%,  rgba(120,160,255,0.22) 0%, transparent 60%),
            radial-gradient(ellipse 50% 70% at 90% 80%,  rgba(180,100,255,0.15) 0%, transparent 60%),
            radial-gradient(ellipse 60% 50% at 50% 50%,  rgba(61,79,255,0.07) 0%, transparent 70%),
            linear-gradient(160deg, #dde4f8 0%, #eaeef9 40%, #f4eeff 70%, #f0f3fc 100%);
    }

    .circuit-lines {
        position: fixed; inset: 0; z-index: -1; pointer-events: none;
        transition: opacity 0.4s ease;
    }
    [data-theme="dark"] .circuit-lines {
        background-image:
            linear-gradient(90deg, transparent 0%, transparent 99%, rgba(0,229,255,0.06) 99.5%, transparent 100%),
            linear-gradient(0deg,  transparent 0%, transparent 99%, rgba(0,229,255,0.04) 99.5%, transparent 100%);
        background-size: 80px 80px;
        animation: gridDrift 30s linear infinite;
        opacity: 1;
    }
    [data-theme="light"] .circuit-lines {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        opacity: 0.6;
    }
    @keyframes gridDrift {
        from { transform: translate(0,0); }
        to   { transform: translate(80px,80px); }
    }

    /* ============================================================
       THEME SWITCH BUTTON
    ============================================================ */
    .theme-switch {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        padding: 0 1.5rem;
        border: none;
        background: transparent;
        flex-shrink: 0;
    }

    .switch-track {
        position: relative;
        width: 48px; height: 26px;
        background: var(--switch-bg);
        border: 1px solid var(--switch-border);
        border-radius: 999px;
        transition: background 0.3s, border-color 0.3s;
    }

    .switch-knob {
        position: absolute;
        top: 3px; left: 3px;
        width: 18px; height: 18px;
        background: var(--switch-knob);
        border-radius: 50%;
        transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), background 0.3s;
        display: flex; align-items: center; justify-content: center;
        font-size: 10px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    [data-theme="light"] .switch-knob {
        transform: translateX(22px);
    }

    .switch-icon {
        font-size: 0.85rem;
        line-height: 1;
        transition: color 0.3s, opacity 0.3s;
    }

    .switch-icon.sun  { color: var(--gold); }
    .switch-icon.moon { color: var(--cyan); }

    [data-theme="light"] .switch-icon.moon { opacity: 0.4; }
    [data-theme="dark"]  .switch-icon.sun  { opacity: 0.4; }

    /* ============================================================
       HEADER
    ============================================================ */
    header {
        position: relative;
        padding: 3rem 0 2.5rem;
        border-bottom: 1px solid var(--border-glow);
        overflow: hidden;
        transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
    }
    [data-theme="dark"] header {
        background: linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-void) 100%);
        box-shadow: 0 0 30px rgba(0,229,255,0.08);
    }
    [data-theme="light"] header {
        background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(240,244,255,0.7) 100%);
        backdrop-filter: blur(24px) saturate(200%);
        -webkit-backdrop-filter: blur(24px) saturate(200%);
        box-shadow: 0 4px 40px rgba(100,130,200,0.15), inset 0 -1px 0 rgba(255,255,255,0.6);
    }

    header::before {
        content: '';
        position: absolute;
        bottom: -1px; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, var(--cyan) 30%, var(--orange) 70%, transparent 100%);
        animation: scanLine 4s ease-in-out infinite;
    }
    @keyframes scanLine {
        0%, 100% { opacity: 0.4; transform: scaleX(0.6); }
        50%       { opacity: 1;   transform: scaleX(1); }
    }

    .header-content {
        max-width: 1400px; margin: 0 auto; padding: 0 2rem;
        text-align: center; position: relative; z-index: 1;
    }

    .logo {
        font-family: 'Orbitron', monospace;
        font-size: 3.6rem; font-weight: 900;
        letter-spacing: 8px; text-transform: uppercase;
        cursor: default; user-select: none;
        transition: filter 0.4s;
    }
    [data-theme="dark"] .logo {
        background: linear-gradient(90deg, var(--cyan) 0%, var(--text-bright) 40%, var(--orange) 80%, var(--gold) 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        filter: drop-shadow(0 0 20px rgba(0,229,255,0.5));
        animation: logoBreath 4s ease-in-out infinite alternate;
    }
    [data-theme="light"] .logo {
        background: linear-gradient(135deg, var(--cyan) 0%, var(--orange) 50%, var(--gold) 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        filter: drop-shadow(0 2px 12px rgba(61,79,255,0.3));
    }
    @keyframes logoBreath {
        from { filter: drop-shadow(0 0 15px rgba(0,229,255,0.4)) drop-shadow(0 0 40px rgba(0,229,255,0.1)); }
        to   { filter: drop-shadow(0 0 25px rgba(255,107,0,0.5)) drop-shadow(0 0 60px rgba(255,107,0,0.2)); }
    }
    .logo:hover { animation: glitch 0.4s steps(1) forwards; }
    @keyframes glitch {
        0%   { transform: translate(0); }
        20%  { transform: translate(-3px, 2px); }
        40%  { transform: translate(3px, -2px); }
        60%  { transform: translate(-2px, 3px); }
        80%  { transform: translate(2px, -3px); }
        100% { transform: translate(0); }
    }

    .tagline {
        font-size: 1.1rem; font-weight: 500;
        color: var(--text-dim); letter-spacing: 4px;
        text-transform: uppercase; margin-top: 0.75rem;
    }

    /* ============================================================
       NAV — DESKTOP
    ============================================================ */
    nav {
        padding: 0;
        position: sticky; top: 0; z-index: 1000;
        border-bottom: 1px solid var(--border-dim);
        transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
    }
    [data-theme="dark"] nav {
        background: rgba(8,13,26,0.96);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    [data-theme="light"] nav {
        background: rgba(255,255,255,0.82);
        backdrop-filter: blur(24px) saturate(200%); -webkit-backdrop-filter: blur(24px) saturate(200%);
        box-shadow: 0 4px 24px rgba(100,130,200,0.12), inset 0 -1px 0 rgba(61,79,255,0.06);
    }

    .nav-inner {
        display: flex; align-items: center; justify-content: space-between;
        max-width: 1400px; margin: 0 auto; padding: 0 2rem;
        min-height: 56px;
    }

    nav ul {
        display: flex; list-style: none; gap: 0;
        flex: 1; justify-content: center;
    }

    nav a {
        font-family: 'Orbitron', monospace; color: var(--text-mid);
        text-decoration: none; font-weight: 600; font-size: 0.82rem;
        text-transform: uppercase; letter-spacing: 2px;
        display: block; padding: 1.4rem 1.6rem;
        position: relative; transition: color var(--transition);
    }
    nav a::after {
        content: ''; position: absolute;
        bottom: 0; left: 50%; width: 0; height: 2px;
        background: linear-gradient(90deg, var(--cyan), var(--orange));
        border-radius: 999px; transform: translateX(-50%);
        transition: width var(--transition);
    }
    nav a:hover { color: var(--cyan); }
    nav a:hover::after { width: 70%; }

    /* ============================================================
       HAMBURGER (mobile)
    ============================================================ */
    .menu-toggle {
        display: none;
        flex-direction: column;
        justify-content: space-between;
        width: 34px; height: 22px;
        cursor: pointer; z-index: 1100;
        background: transparent; border: none;
        padding: 0.25rem;
        border-radius: 6px;
        transition: background var(--transition);
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
    }
    .menu-toggle:active {
        background: var(--border-dim);
    }
    .menu-toggle span {
        display: block; height: 2.5px;
        background: var(--cyan); border-radius: 2px;
        transition: transform 0.35s ease, opacity 0.25s ease, width 0.25s ease;
        transform-origin: center;
    }
    .menu-toggle span:nth-child(2) { width: 75%; }

    .menu-toggle.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .menu-toggle.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .menu-toggle.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    /* ============================================================
       SIDEBAR MÓVIL
    ============================================================ */
    .sidebar-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        z-index: 1050;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
    }
    .sidebar-overlay.visible {
        opacity: 1;
        pointer-events: all;
    }

    .sidebar {
        position: fixed;
        top: 0; left: 0;
        width: 280px; height: 100dvh;
        z-index: 1060;
        display: flex; flex-direction: column;
        transform: translateX(-100%);
        transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        overflow: hidden;
    }
    [data-theme="dark"] .sidebar {
        background: rgba(8,13,26,0.98);
        border-right: 1px solid var(--border-glow);
        box-shadow: 8px 0 40px rgba(0,229,255,0.1);
    }
    [data-theme="light"] .sidebar {
        background: rgba(255,255,255,0.96);
        backdrop-filter: blur(24px);
        border-right: 1px solid rgba(255,255,255,0.8);
        box-shadow: 8px 0 40px rgba(61,79,255,0.12);
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-header {
        padding: 2rem 1.5rem 1.5rem;
        border-bottom: 1px solid var(--border-dim);
        display: flex; align-items: center; justify-content: space-between;
    }

    .sidebar-logo {
        font-family: 'Orbitron', monospace;
        font-size: 1rem; font-weight: 800;
        letter-spacing: 3px; text-transform: uppercase;
        background: linear-gradient(90deg, var(--cyan), var(--orange));
        -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .sidebar-close {
        background: transparent; border: none;
        color: var(--text-dim); font-size: 1.4rem;
        cursor: pointer; padding: 0.3rem;
        transition: color var(--transition);
        line-height: 1;
    }
    .sidebar-close:hover { color: var(--cyan); }

    .sidebar-nav {
        flex: 1; overflow-y: auto;
        padding: 1.5rem 0;
    }

    .sidebar-nav ul { list-style: none; }
    .sidebar-nav li { border-bottom: 1px solid var(--border-dim); }
    .sidebar-nav li:last-child { border-bottom: none; }

    .sidebar-nav a {
        font-family: 'Orbitron', monospace;
        display: flex; align-items: center; gap: 1rem;
        padding: 1rem 1.75rem;
        color: var(--text-mid); text-decoration: none;
        font-size: 0.85rem; font-weight: 600;
        text-transform: uppercase; letter-spacing: 1.5px;
        transition: all var(--transition);
        position: relative;
    }
    .sidebar-nav a::before {
        content: '';
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, var(--cyan), var(--orange));
        transform: scaleY(0); transform-origin: bottom;
        transition: transform var(--transition);
        border-radius: 0 2px 2px 0;
    }
    .sidebar-nav a:hover { color: var(--cyan); padding-left: 2.25rem; }
    .sidebar-nav a:hover::before { transform: scaleY(1); }

    .sidebar-nav .nav-icon {
        font-size: 1rem; color: var(--orange);
        width: 20px; text-align: center;
        transition: color var(--transition);
    }
    .sidebar-nav a:hover .nav-icon { color: var(--cyan); }

    .sidebar-footer {
        padding: 1.5rem;
        border-top: 1px solid var(--border-dim);
        display: flex; align-items: center; justify-content: space-between;
    }

    .sidebar-theme-label {
        font-family: 'Orbitron', monospace;
        font-size: 0.7rem; color: var(--text-dim);
        text-transform: uppercase; letter-spacing: 1px;
    }

    /* ============================================================
       MAIN
    ============================================================ */
    main { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }

    /* ============================================================
       HERO
    ============================================================ */
    .hero {
        position: relative; min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        text-align: center; padding: 8rem 2rem 6rem; overflow: hidden;
    }
    [data-theme="dark"] .hero::before {
        content: '';
        position: absolute; inset: 0;
        background:
            radial-gradient(ellipse 70% 60% at 50% 50%, rgba(0,229,255,0.06) 0%, transparent 60%),
            radial-gradient(ellipse 40% 40% at 20% 80%, rgba(255,107,0,0.05) 0%, transparent 60%);
        pointer-events: none;
    }
    [data-theme="light"] .hero::before {
        content: '';
        position: absolute; inset: 0;
        background:
            radial-gradient(ellipse 60% 60% at 10% 20%, rgba(120,160,255,0.15) 0%, transparent 60%),
            radial-gradient(ellipse 50% 50% at 90% 80%, rgba(143,95,255,0.12) 0%, transparent 60%);
        pointer-events: none;
        animation: orbFloat 10s ease-in-out infinite alternate;
    }
    @keyframes orbFloat {
        from { transform: scale(1) translate(0,0); }
        to   { transform: scale(1.05) translate(10px,-10px); }
    }

    .hero::after {
        content: '';
        position: absolute; top: 0; left: -100%;
        width: 1px; height: 100%;
        background: linear-gradient(180deg, transparent, var(--cyan), transparent);
        animation: heroCursor 10s ease-in-out infinite;
        pointer-events: none; opacity: 0.3;
    }
    @keyframes heroCursor {
        0%   { left: -5%; opacity: 0; }
        10%  { opacity: 0.3; }
        90%  { opacity: 0.3; }
        100% { left: 105%; opacity: 0; }
    }

    .hero-content { position: relative; z-index: 2; max-width: 900px; }

    .hero h1 {
        font-family: 'Orbitron', monospace;
        font-size: 3.2rem; font-weight: 800;
        line-height: 1.15; letter-spacing: 2px;
        text-transform: uppercase; margin-bottom: 1.75rem;
        background: linear-gradient(135deg, var(--text-bright) 20%, var(--cyan) 60%, var(--orange) 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .hero p {
        font-size: 1.2rem; color: var(--text-mid);
        margin-bottom: 2.5rem; max-width: 680px;
        margin-left: auto; margin-right: auto; line-height: 1.7;
    }

    .intro-list {
        list-style: none; padding: 0;
        margin: 0 auto 2.5rem; max-width: 680px;
        display: grid; gap: 0.6rem; text-align: left;
        transition: background 0.4s, border-color 0.4s;
    }
    [data-theme="light"] .intro-list {
        background: rgba(255,255,255,0.65);
        backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 16px;
        padding: 1.75rem 2rem;
        box-shadow: 0 8px 40px rgba(100,130,200,0.12), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .intro-list li {
        font-size: 1rem; color: var(--text-mid);
        padding: 0.45rem 0.6rem 0.45rem 1.5rem;
        position: relative;
        border-bottom: 1px solid var(--border-dim);
        border-radius: 8px;
        transition: color var(--transition), background var(--transition), box-shadow var(--transition), padding-left var(--transition);
        overflow: hidden;
    }
    .intro-list li:last-child { border-bottom: none; }

    /* Brillo lateral al hover */
    .intro-list li::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(61,79,255,0.08) 0%, transparent 80%);
        opacity: 0;
        transition: opacity var(--transition);
        pointer-events: none;
        border-radius: 8px;
    }
    [data-theme="dark"] .intro-list li::after {
        background: linear-gradient(90deg, rgba(0,229,255,0.1) 0%, transparent 80%);
    }

    .intro-list li:hover {
        color: var(--text-bright);
        padding-left: 2rem;
        background: rgba(61,79,255,0.05);
        box-shadow: inset 3px 0 0 var(--cyan);
    }
    [data-theme="dark"] .intro-list li:hover {
        background: rgba(0,229,255,0.05);
        box-shadow: inset 3px 0 0 var(--cyan);
    }
    .intro-list li:hover::after { opacity: 1; }

    .intro-list li::before {
        content: '▸'; position: absolute; left: 0.3rem;
        color: var(--cyan); font-size: 0.8rem;
        top: 50%; transform: translateY(-50%);
        transition: transform var(--transition), left var(--transition);
    }
    .intro-list li:hover::before {
        left: 0.6rem;
        transform: translateY(-50%) scale(1.3);
    }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .btn {
        display: inline-block;
        font-family: 'Orbitron', monospace; font-weight: 700;
        font-size: 0.88rem; text-transform: uppercase;
        letter-spacing: 2px; text-decoration: none;
        padding: 0.95rem 2.5rem;
        border: none; cursor: pointer;
        position: relative; overflow: hidden;
        clip-path: var(--clip-btn);
        border-radius: var(--radius-sharp);
        transition: transform var(--transition), box-shadow var(--transition);
    }
    [data-theme="dark"] .btn {
        background: linear-gradient(90deg, var(--cyan), var(--orange));
        color: var(--bg-void);
        box-shadow: 0 6px 24px rgba(0,229,255,0.3);
    }
    [data-theme="light"] .btn {
        background: linear-gradient(135deg, var(--cyan) 0%, var(--orange) 100%);
        color: #fff;
        box-shadow: 0 6px 24px rgba(61,79,255,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
        border-radius: 999px;
    }
    .btn::before {
        content: ''; position: absolute; top: 0; left: -100%;
        width: 60%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transform: skewX(-20deg); transition: left 0.55s ease;
    }
    .btn:hover::before { left: 150%; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(0,229,255,0.4); }
    .btn.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    /* ============================================================
       SECTIONS
    ============================================================ */
    section {
        margin-bottom: 5rem;
        padding: 4rem;
        position: relative; overflow: hidden;
        transition: background 0.4s, border-color 0.4s, box-shadow 0.4s, border-radius 0.4s;
    }
    [data-theme="dark"] section {
        background: rgba(13,19,34,0.85);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-dim);
        clip-path: var(--clip-corner);
    }
    [data-theme="dark"] section:hover { border-color: rgba(0,229,255,0.25); }
    [data-theme="light"] section {
        background: rgba(255,255,255,0.65);
        backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 24px;
        box-shadow: 0 12px 48px rgba(100,130,200,0.12), inset 0 1px 0 rgba(255,255,255,0.95);
    }
    [data-theme="light"] section:hover { box-shadow: 0 20px 64px rgba(61,79,255,0.16), inset 0 1px 0 rgba(255,255,255,0.95); }

    /* Reflejo superior (ambos temas) */
    section::before {
        content: ''; position: absolute;
        top: 0; left: 10%; right: 10%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6) 50%, transparent);
        pointer-events: none;
    }

    h2 {
        font-family: 'Orbitron', monospace;
        font-size: 2.4rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: 4px;
        margin-bottom: 1.5rem;
        color: var(--text-bright);
        position: relative; display: inline-block;
        overflow-wrap: break-word; word-break: break-word;
    }
    h2::after {
        content: ''; position: absolute;
        bottom: -10px; left: 0; height: 2px;
        background: linear-gradient(90deg, var(--cyan), var(--orange), transparent);
        border-radius: 999px;
        transition: width var(--transition);
        width: 60px;
    }
    section:hover h2::after { width: 100%; }

    section > p {
        color: var(--text-mid); font-size: 1.1rem;
        max-width: 800px; margin-bottom: 3rem; line-height: 1.7;
    }

    /* ============================================================
       SERVICES GRID
    ============================================================ */
    .services-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(280px,100%),1fr));
        gap: 1.5rem; margin-top: 2rem;
    }

    .service-card {
        padding: 2.5rem 2rem; position: relative; overflow: hidden;
        transition: all var(--transition);
    }
    [data-theme="dark"] .service-card {
        background: var(--bg-card);
        border: 1px solid var(--border-dim);
        clip-path: polygon(16px 0%, 100% 0%, calc(100% - 16px) 100%, 0% 100%);
    }
    [data-theme="dark"] .service-card:hover {
        background: var(--bg-elevated);
        border-color: var(--border-glow);
        transform: translateY(-6px);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5), var(--glow-cyan);
    }
    [data-theme="light"] .service-card {
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(100,130,200,0.1), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    [data-theme="light"] .service-card:hover {
        background: rgba(255,255,255,0.9);
        transform: translateY(-8px);
        box-shadow: 0 20px 50px rgba(61,79,255,0.18), inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .service-card::before {
        content: ''; position: absolute;
        top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, var(--cyan), var(--orange));
        transform: scaleX(0); transform-origin: left;
        transition: transform var(--transition);
    }
    [data-theme="light"] .service-card::before { border-radius: 16px 16px 0 0; }
    .service-card:hover::before { transform: scaleX(1); }

    .service-icon {
        font-size: 2.5rem; color: var(--orange);
        margin-bottom: 1.25rem; display: block;
        transition: color var(--transition), transform var(--transition);
    }
    .service-card:hover .service-icon { color: var(--cyan); transform: scale(1.1) translateY(-2px); }

    .service-card h3 {
        font-family: 'Orbitron', monospace; font-size: 1.05rem;
        color: var(--cyan); margin-bottom: 0.9rem;
        text-transform: uppercase; letter-spacing: 1px;
    }
    .service-card p { color: var(--text-mid); margin-bottom: 1.2rem; font-size: 0.97rem; line-height: 1.6; }
    .service-card ul { list-style: none; }
    .service-card li {
        color: var(--text-bright); margin-bottom: 0.6rem;
        padding-left: 1.2rem; position: relative;
        font-size: 0.92rem; font-weight: 500;
    }
    .service-card li::before { content: '›'; position: absolute; left: 0; color: var(--orange); font-weight: 700; }

    /* ============================================================
       PROJECTS
    ============================================================ */
    .projects-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(360px,100%),1fr));
        gap: 2rem; margin-top: 2rem;
    }

    .project-card {
        overflow: hidden; position: relative;
        transition: all var(--transition);
    }
    [data-theme="dark"] .project-card {
        background: var(--bg-card);
        border: 1px solid var(--border-dim);
        clip-path: var(--clip-corner);
    }
    [data-theme="dark"] .project-card:hover {
        border-color: var(--border-glow);
        transform: translateY(-5px);
        box-shadow: 0 25px 60px rgba(0,0,0,0.6), var(--glow-cyan);
    }
    [data-theme="light"] .project-card {
        background: rgba(255,255,255,0.65);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 16px;
        box-shadow: 0 6px 24px rgba(100,130,200,0.1), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    [data-theme="light"] .project-card:hover {
        transform: translateY(-6px) scale(1.01);
        box-shadow: 0 24px 60px rgba(61,79,255,0.2), inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .project-image {
        height: 240px; background-size: cover;
        background-position: center; position: relative;
        background-color: var(--bg-deep); overflow: hidden;
    }
    [data-theme="dark"] .project-image::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(to bottom, transparent 50%, var(--bg-card) 100%);
    }
    [data-theme="light"] .project-image::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.85) 100%);
    }

    .project-video { position: relative; overflow: hidden; width: 100%; }
    .project-video video, .project-video iframe {
        width: 100%; height: 240px; object-fit: cover; display: block; border: none;
    }

    .project-info { padding: 2rem; }
    .project-info h3 {
        font-family: 'Orbitron', monospace; color: var(--cyan);
        font-size: 1.05rem; margin-bottom: 0.9rem;
        text-transform: uppercase; letter-spacing: 0.5px;
        line-height: 1.3; overflow-wrap: break-word; word-break: break-word;
    }
    .project-info p { color: var(--text-mid); font-size: 0.92rem; line-height: 1.65; overflow-wrap: break-word; }

    .tech-tags { display: flex; flex-wrap: wrap; gap: 0.6rem; margin: 1.25rem 0 1.5rem; }
    .tech-tag {
        padding: 0.3rem 0.9rem; font-size: 0.72rem; font-weight: 700;
        font-family: 'Orbitron', monospace; text-transform: uppercase; letter-spacing: 0.5px;
        clip-path: var(--clip-tag); border-radius: var(--radius-sharp);
        transition: all var(--transition);
    }
    [data-theme="dark"] .tech-tag {
        background: linear-gradient(90deg, rgba(0,229,255,0.12), rgba(255,107,0,0.12));
        border: 1px solid rgba(0,229,255,0.3); color: var(--cyan);
    }
    [data-theme="dark"] .tech-tag:hover { background: linear-gradient(90deg, rgba(0,229,255,0.25), rgba(255,107,0,0.25)); border-color: var(--cyan); }
    [data-theme="light"] .tech-tag {
        background: rgba(61,79,255,0.08); border: 1px solid rgba(61,79,255,0.2);
        color: var(--cyan); border-radius: 999px; clip-path: none;
    }
    [data-theme="light"] .tech-tag:hover { background: rgba(61,79,255,0.15); border-color: var(--cyan); }

    .project-card.placeholder {
        border-style: dashed; border-color: var(--border-dim); opacity: 0.65;
    }
    .project-card.placeholder:hover { opacity: 0.9; }

    /* ============================================================
       CAROUSEL / GALERÍA
    ============================================================ */
    #carrusel {
        --transition-time: 0.6s;
        padding: 4rem 2rem;
        position: relative; overflow: hidden;
        transition: background 0.4s;
    }
    [data-theme="dark"] #carrusel {
        background: var(--bg-deep);
    }
    [data-theme="dark"] #carrusel::before {
        content: ''; position: absolute; inset: 0;
        background: repeating-linear-gradient(
            -45deg, transparent, transparent 40px,
            rgba(0,229,255,0.012) 40px, rgba(0,229,255,0.012) 41px);
        pointer-events: none;
    }
    [data-theme="light"] #carrusel { background: transparent; padding: 1rem 2rem 4rem; }

    .carousel-header { margin-bottom: 2.5rem; }

    .carousel-title {
        font-family: 'Orbitron', monospace; font-size: 2.4rem;
        font-weight: 700; color: var(--text-bright);
        text-transform: uppercase; letter-spacing: 4px;
        position: relative; display: inline-block;
    }
    .carousel-title::after {
        content: ''; position: absolute;
        bottom: -10px; left: 0; width: 60px; height: 2px;
        background: linear-gradient(90deg, var(--cyan), var(--orange));
        border-radius: 999px; transition: width var(--transition);
    }
    #carrusel:hover .carousel-title::after { width: 100%; }

    .carousel-container {
        position: relative; max-width: 1000px; margin: 0 auto;
        overflow: hidden; transition: border-color 0.4s, box-shadow 0.4s, border-radius 0.4s;
    }
    [data-theme="dark"] .carousel-container {
        border: 1px solid var(--border-dim);
        clip-path: var(--clip-corner);
        box-shadow: 0 30px 80px rgba(0,0,0,0.6), var(--glow-cyan);
    }
    [data-theme="light"] .carousel-container {
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(61,79,255,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .carousel-track { position: relative; height: 520px; }

    .carousel-slide {
        position: absolute; inset: 0;
        opacity: 0; transition: opacity var(--transition-time) ease; z-index: 0;
    }
    .carousel-slide.active { opacity: 1; z-index: 1; }

    .slide-content { position: relative; width: 100%; height: 100%; overflow: hidden; }

    .carousel-slide img {
        width: 100%; height: 100%; object-fit: cover;
        filter: brightness(0.65) saturate(0.85);
        transition: filter var(--transition-time) ease;
    }
    .carousel-slide.active img { filter: brightness(0.85) saturate(1); }

    /* Slides de VIDEO */
    .carousel-slide video {
        width: 100%; height: 100%; object-fit: cover; display: block;
    }

    .caption {
        position: absolute; bottom: 0; left: 0; right: 0; padding: 2.5rem;
        transform: translateY(10px); opacity: 0;
        transition: all calc(var(--transition-time) + 0.15s) ease;
    }
    [data-theme="dark"] .caption {
        background: linear-gradient(to top, rgba(5,8,16,0.95) 0%, rgba(5,8,16,0.6) 60%, transparent 100%);
    }
    [data-theme="light"] .caption {
        background: linear-gradient(to top, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.7) 55%, transparent 100%);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .carousel-slide.active .caption { transform: translateY(0); opacity: 1; }

    .caption h3 {
        font-family: 'Orbitron', monospace; font-size: 1.4rem;
        font-weight: 700; margin-bottom: 0.5rem;
        background: linear-gradient(90deg, var(--cyan), var(--orange));
        -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .caption p { font-size: 0.92rem; line-height: 1.55; max-width: 600px; color: var(--text-mid); }

    .carousel-control {
        position: absolute; top: 50%; transform: translateY(-50%);
        width: 44px; height: 44px;
        border: 1px solid var(--border-glow);
        color: var(--cyan); display: flex; align-items: center; justify-content: center;
        cursor: pointer; z-index: 10; transition: all var(--transition);
    }
    [data-theme="dark"] .carousel-control {
        background: rgba(0,229,255,0.08);
        backdrop-filter: blur(8px);
        clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
    [data-theme="light"] .carousel-control {
        background: rgba(255,255,255,0.8);
        backdrop-filter: blur(12px);
        border-radius: 50%; clip-path: none;
        box-shadow: 0 4px 16px rgba(100,130,200,0.2);
        color: var(--cyan);
    }
    .carousel-control:hover {
        background: rgba(0,229,255,0.2);
        box-shadow: var(--glow-cyan);
        transform: translateY(calc(-50% - 2px));
    }
    [data-theme="light"] .carousel-control:hover { background: rgba(255,255,255,0.95); }
    .carousel-control svg { width: 20px; height: 20px; }
    .prev { left: 1.5rem; }
    .next { right: 1.5rem; }

    .carousel-indicators {
        position: absolute; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
        display: flex; gap: 0.5rem; z-index: 10; flex-wrap: wrap; justify-content: center;
    }
    .indicator {
        height: 3px; border-radius: 999px; border: none; cursor: pointer;
        background: rgba(255,255,255,0.25); padding: 0;
        transition: all 0.3s ease; width: 24px;
    }
    .indicator.active {
        background: var(--cyan); width: 40px;
        box-shadow: 0 0 8px var(--cyan);
    }
    .indicator:hover:not(.active) { background: rgba(255,255,255,0.5); }

    /* ============================================================
       CONTACT
    ============================================================ */
    .contact-info {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(260px,100%),1fr));
        gap: 2rem; margin-top: 2.5rem;
    }
    .contact-method { display: flex; align-items: flex-start; gap: 1.25rem; margin-bottom: 1.75rem; }
    .contact-icon { font-size: 1.6rem; color: var(--orange); margin-top: 0.2rem; flex-shrink: 0; }
    .contact-details h4 {
        font-family: 'Orbitron', monospace; color: var(--cyan);
        margin-bottom: 0.4rem; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
    }
    .contact-details p { color: var(--text-mid); font-size: 0.95rem; }
    .contact-form { margin-top: 3.5rem; }
    .form-group { margin-bottom: 1.75rem; }
    label {
        display: block; font-family: 'Orbitron', monospace;
        color: var(--text-dim); margin-bottom: 0.6rem;
        font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.78rem;
    }
    input, textarea {
        width: 100%; padding: 1rem 1.25rem;
        color: var(--text-bright); font-family: 'Rajdhani', sans-serif;
        font-size: 1rem; font-weight: 500; outline: none;
        transition: all var(--transition);
    }
    [data-theme="dark"] input, [data-theme="dark"] textarea {
        background: var(--bg-deep); border: 1px solid var(--border-dim);
        border-bottom: 2px solid var(--border-dim);
        clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    }
    [data-theme="dark"] input:focus, [data-theme="dark"] textarea:focus {
        border-color: var(--border-glow); border-bottom-color: var(--cyan);
        box-shadow: 0 4px 20px rgba(0,229,255,0.1);
    }
    [data-theme="light"] input, [data-theme="light"] textarea {
        background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.8); border-bottom: 2px solid rgba(61,79,255,0.15);
        border-radius: 12px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(100,130,200,0.08);
    }
    [data-theme="light"] input:focus, [data-theme="light"] textarea:focus {
        background: rgba(255,255,255,0.92); border-bottom-color: var(--cyan);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.95), 0 4px 20px rgba(61,79,255,0.15);
    }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }
    textarea { min-height: 140px; resize: vertical; }

    /* ============================================================
       SOCIAL LINKS
    ============================================================ */
    .social-links { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .social-links a {
        font-size: 1.5rem; transition: all var(--transition); padding: 0.5rem;
        display: flex; align-items: center; justify-content: center;

        }

        .prev { left: 0.6rem; }
        .next { right: 0.6rem; }
        .indicator { width: 20px; height: 3px; }
        .indicator.active { width: 32px; }

        /* ── CONTACT ── */
        .contact-info { grid-template-columns: 1fr; gap: 0; }
        .contact-method { gap: 1rem; margin-bottom: 1.25rem; }
        .contact-icon { font-size: 1.4rem; }

        .contact-details p { font-size: 0.88rem; }
        .contact-form { margin-top: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { font-size: 0.72rem; }
        input, textarea {

            padding: 0.9rem 1rem;
            font-size: 0.95rem;
        }

        /* ── SOCIAL ── */
        .social-links { gap: 0.75rem; margin-top: 1.25rem; }
        .social-links a { font-size: 1.3rem; }
        [data-theme="light"] .social-links a { width: 38px; height: 38px; }

        /* ── FOOTER ── */
        footer { padding: 1.75rem 0 1.25rem; margin-top: 2.5rem; }
        .footer-content {
            grid-template-columns: 1fr;
            padding: 1.25rem 1.25rem 0;
            gap: 1.5rem;
        }
        .footer-section h3 { font-size: 0.85rem; margin-bottom: 0.9rem; }
        .footer-section p, .footer-section ul li { font-size: 0.85rem; }
        .copyright { font-size: 0.6rem; padding: 0.9rem 1rem 0; }

        .sidebar { width: min(280px, 85vw); }

    /* ============================================================
       RESPONSIVE — 480px (móviles pequeños)
    ============================================================ */
    @media (max-width: 480px) {
        header { padding: 1.25rem 0; }

    <script>
    // ── THEME SWITCH ─────────────────────────────────────────────
    (function() {
        var html = document.documentElement;
        var STORAGE_KEY = 'ivality-theme';

        // Aplicar tema guardado inmediatamente (antes del DOM completo)
        var saved = localStorage.getItem(STORAGE_KEY) || 'light';
        html.setAttribute('data-theme', saved);

        function toggleTheme() {
            var current = html.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem(STORAGE_KEY, next);
        }

        // Esperar DOM antes de agregar listeners
        function bindSwitches() {
            var desktop = document.getElementById('theme-switch-desktop');
            var sidebar = document.getElementById('theme-switch-sidebar');
            if (desktop) desktop.addEventListener('click', toggleTheme);
            if (sidebar)  sidebar.addEventListener('click', toggleTheme);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', bindSwitches);
        } else {
            bindSwitches();
        }
    })();

    // ── SIDEBAR ──────────────────────────────────────────────────
    (function() {
        var _initialized = false;

        function initSidebar() {
            // Evitar doble inicialización
            if (_initialized) return;

            var sidebar  = document.getElementById('sidebar');
            var overlay  = document.getElementById('sidebar-overlay');
            var toggle   = document.getElementById('menu-toggle');
            var closeBtn = document.getElementById('sidebar-close');

            // Verificar que todos los elementos existen antes de continuar
            if (!sidebar || !overlay || !toggle || !closeBtn) return;

            _initialized = true;

            // Overlay: visible pero sin bloquear clicks cuando está cerrado
            overlay.style.display = 'block';
            overlay.style.pointerEvents = 'none';

            function open() {
                sidebar.classList.add('open');
                overlay.classList.add('visible');
                overlay.style.pointerEvents = 'all';
                toggle.classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function close() {
                sidebar.classList.remove('open');
                overlay.classList.remove('visible');
                overlay.style.pointerEvents = 'none';
                toggle.classList.remove('open');
                document.body.style.overflow = '';
            }

            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                e.stopImmediatePropagation();
                sidebar.classList.contains('open') ? close() : open();
            });

            closeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                close();
            });

            overlay.addEventListener('click', close);

            document.querySelectorAll('.sidebar-link').forEach(function(link) {
                link.addEventListener('click', close);
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && sidebar.classList.contains('open')) close();
            });
        }

        // Un solo punto de entrada — DOMContentLoaded o inmediato si ya cargó
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initSidebar);
        } else {
            initSidebar();
        }
    })();

    // ── CARRUSEL GALERÍA ─────────────────────────────────────────
    (function() {
        var track      = document.getElementById('gallery-track');
        if (!track) return;

        var slides     = track.querySelectorAll('.carousel-slide');
        var container  = document.getElementById('gallery-indicators');
        var current    = 0;
        var timer;
        var INTERVAL   = 5000;

        // Construir indicadores
        slides.forEach(function(_, i) {
            var btn = document.createElement('button');
            btn.className = 'indicator' + (i === 0 ? ' active' : '');
            btn.setAttribute('aria-label', 'Ir a slide ' + (i + 1));
            btn.addEventListener('click', function() { goTo(i); });
            container.appendChild(btn);
        });

        function indicators() { return container.querySelectorAll('.indicator'); }

        function goTo(n) {
            var dots = indicators();
            slides[current].classList.remove('active');
            dots[current].classList.remove('active');

            // Pausar video anterior
            var prevVideo = slides[current].querySelector('video');
            if (prevVideo) prevVideo.pause();

            current = (n + slides.length) % slides.length;
            slides[current].classList.add('active');
            dots[current].classList.add('active');

            // Reproducir video nuevo
            var nextVideo = slides[current].querySelector('video');
            if (nextVideo) nextVideo.play().catch(function(){});

            resetTimer();
        }

        function resetTimer() {
            clearInterval(timer);
            timer = setInterval(function() { goTo(current + 1); }, INTERVAL);
        }

        var wrap = track.closest('.carousel-container');
        wrap.querySelector('.carousel-control.prev').addEventListener('click', function() { goTo(current - 1); });
        wrap.querySelector('.carousel-control.next').addEventListener('click', function() { goTo(current + 1); });

        // Swipe táctil
        var startX = 0;
        wrap.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, { passive: true });
        wrap.addEventListener('touchend', function(e) {
            var diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) goTo(current + (diff > 0 ? 1 : -1));
        }, { passive: true });

        // Arrancar
        resetTimer();
    })();
    </script>
